name: OT History Fetch

# Pulls historical OT requests from DokoKin for the last N months and merges
# them into ot-requests.json (Gist). Useful for backfilling the dashboard
# with OT records created outside this automation.

on:
  workflow_dispatch:
    inputs:
      months_back:
        description: "How many months back to fetch (incl. current month)"
        required: false
        default: "24"
      clean_seeds:
        description: "Remove ot_seed* mock entries from Gist"
        required: false
        default: "true"
      fetch_timesheet:
        description: "Also fetch monthly timesheet aggregates for payslip cross-check"
        required: false
        default: "true"

permissions:
  contents: read

env:
  TZ: Asia/Tokyo

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run OT history fetch
        id: fetch
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          MONTHS_BACK: ${{ inputs.months_back }}
          CLEAN_SEEDS: ${{ inputs.clean_seeds }}
          FETCH_TIMESHEET: ${{ inputs.fetch_timesheet }}
        run: python .github/scripts/ot_history_fetch.py
      # Phase 3: token rotation is queued by the worker into Gist
      # pending_token_rotation.json and applied centrally by token-monitor.yml.

