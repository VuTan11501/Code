name: Azure Re-authenticate

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  TZ: Asia/Tokyo

# Share the same lock as token-monitor — both mutate AZURE_REFRESH_TOKEN.
concurrency:
  group: azure-token-rotation
  cancel-in-progress: false

jobs:
  reauth:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run device-code flow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GIST_ID: ${{ vars.GIST_ID || 'abc2a47c0a396025a72a6580227ff493' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python .github/scripts/azure_reauth.py
