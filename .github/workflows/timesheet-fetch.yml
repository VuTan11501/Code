name: Timesheet Fetch

# Pulls monthly timesheet detail from DokoKin and stores it as
# `timesheet-history.json` in the Gist. The PWA "Timesheet" tab reads it
# to flag days where actual working time < OT request ("lost OT" detector).

on:
  workflow_dispatch:
    inputs:
      months_keep:
        description: "Rolling window — how many recent months to keep"
        required: false
        default: "120"
      account:
        description: "DokoKin account (default: tanvc)"
        required: false
        default: "tanvc"
      debug_dump:
        description: "DEBUG: dump raw current-month payload and exit (no Gist write)"
        required: false
        type: boolean
        default: false
  schedule:
    # 07:00 JST daily = 22:00 UTC previous day
    - cron: "0 22 * * *"

permissions:
  contents: read

env:
  TZ: Asia/Tokyo

concurrency:
  group: timesheet-fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run timesheet fetch
        id: fetch
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
          MONTHS_KEEP: ${{ inputs.months_keep || '120' }}
          ACCOUNT: ${{ inputs.account || 'tanvc' }}
          DEBUG_DUMP: ${{ inputs.debug_dump && '1' || '' }}
        run: python .github/scripts/gh_timesheet_fetch.py
      # Phase 3: token rotation is queued by the worker into Gist
      # pending_token_rotation.json and applied centrally by token-monitor.yml.

