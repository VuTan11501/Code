name: Auto Request OT

on:
  # Triggered by scheduled-dispatch.yml (Gist-based scheduler) at 10:00 JST daily.
  # Native cron removed for consistent timing via Gist dispatcher.
  workflow_dispatch:

permissions:
  contents: read

env:
  TZ: Asia/Tokyo

jobs:
  create-ot:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Auto Request OT
        id: ot_creator
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python .github/scripts/gh_ot_creator.py
      # Phase 3: token rotation is queued by the worker into Gist
      # pending_token_rotation.json and applied centrally by token-monitor.yml.

