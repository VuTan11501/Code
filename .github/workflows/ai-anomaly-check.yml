name: AI Anomaly Check

on:
  # Trigger: Cloudflare Worker fires repository_dispatch every day at
  # 22:00 UTC (07:00 JST). CF cron is not subject to GitHub's free-tier cron
  # skipping (we observed ~13h delays on the native schedule). Source:
  # cloudflare-worker/heartbeat.js + wrangler.toml `0 22 * * *` cron.
  #
  # If CF Worker is ever unhealthy, fall back to manual `gh workflow run`
  # via workflow_dispatch below.
  repository_dispatch:
    types: [anomaly_check_daily]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry-run (no email/LINE)
        type: boolean
        default: false
      days:
        description: Lookback window (days)
        type: string
        default: '7'

concurrency:
  group: ai-anomaly-check
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      TZ: Asia/Tokyo
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts/

      - name: Run anomaly check  # stdlib-only, uses preinstalled python3
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          AZURE_APP_ID: f5be0f68-7285-4365-b979-10af0f3f4106
          AZURE_TENANT_ID: f01e930a-b52e-42b1-b70f-a8882b5d043b
          GH_PAT: ${{ secrets.GH_PAT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
          AI_API_BASE: https://models.inference.ai.azure.com
        run: |
          FLAGS=""
          [[ "${{ inputs.dry_run }}" == "true" ]] && FLAGS="$FLAGS --dry-run"
          [[ -n "${{ inputs.days }}" && "${{ inputs.days }}" != "7" ]] && FLAGS="$FLAGS --days ${{ inputs.days }}"
          python3 .github/scripts/ai_anomaly_check.py $FLAGS
