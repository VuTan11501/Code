name: Sync Graph Dashboard

# Mirrors the generated knowledge graph into graph-dashboard/ so Cloudflare Pages
# (connected to this repo, no build step) redeploys the latest graph automatically.
#
# Note: this does NOT regenerate the graph — full regeneration needs the LLM agent
# (`/understand`), which cannot run in plain CI. You regenerate locally, commit the
# updated `.understand-anything/knowledge-graph.json`, and this workflow mirrors it.

on:
  push:
    branches: [main]
    paths:
      - '.understand-anything/knowledge-graph.json'
      - '.understand-anything/meta.json'
      - 'scripts/sync-graph-dashboard.mjs'
      - '.github/workflows/sync-graph-dashboard.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-graph-dashboard
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Mirror graph into graph-dashboard/
        run: node scripts/sync-graph-dashboard.mjs

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain graph-dashboard)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add graph-dashboard
            git commit -m "chore(graph-dashboard): sync knowledge graph data"
            git push
          else
            echo "No changes — graph-dashboard already up to date."
          fi

      - name: Deploy to Cloudflare Pages
        # Requires repo secrets CLOUDFLARE_API_TOKEN (Pages:Edit) + CLOUDFLARE_ACCOUNT_ID.
        # Skips gracefully if the token isn't configured (e.g. you deploy manually).
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "CLOUDFLARE_API_TOKEN not set — skipping CF Pages deploy."
            exit 0
          fi
          npx --yes wrangler@4 pages deploy graph-dashboard \
            --project-name=code-graph --branch=main --commit-dirty=true
