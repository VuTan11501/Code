name: Scheduled Run Dispatcher

on:
  schedule:
    # Backup cron — multiple offsets so single skip pattern doesn't kill all triggers
    - cron: '*/15 * * * *'       # 00, 15, 30, 45
    - cron: '5,20,35,50 * * * *' # 05, 20, 35, 50 (offset by 5)
  workflow_dispatch:
    inputs:
      loop_minutes:
        description: 'How many minutes to loop within this run (max ~330)'
        required: false
        default: '120'
        type: string

permissions:
  contents: read
  actions: write

concurrency:
  group: scheduled-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout (sparse — only helper scripts)
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts
          sparse-checkout-cone-mode: false

      - name: Self-looping dispatcher (checks every 30s)
        id: loop
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GIST_ID: ${{ vars.GIST_ID || 'abc2a47c0a396025a72a6580227ff493' }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          LOOP_MINUTES: ${{ inputs.loop_minutes || '120' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: |
          python3 << 'EOF'
          import json, os, sys, time, smtplib, uuid
          from email.mime.text import MIMEText
          from datetime import datetime, timezone, timedelta
          import urllib.request
          import urllib.error

          # --- Import lease + CAS helpers (Phase 4 concurrency safety) ---
          sys.path.insert(0, os.path.join(os.environ.get('GITHUB_WORKSPACE', '.'), '.github/scripts'))
          try:
              from dispatcher_lease import acquire as lease_acquire, heartbeat as lease_heartbeat, release as lease_release
              from gist_cas import cas_update
              HELPERS_OK = True
          except Exception as _imp_err:
              print(f"  ⚠️ Helper import failed ({_imp_err}); running in legacy mode without lease.")
              HELPERS_OK = False

          GIST_ID = os.environ['GIST_ID']
          REPO = os.environ['GITHUB_REPOSITORY']
          TOKEN = os.environ.get('GH_TOKEN', '')
          LOOP_MINUTES = int(os.environ.get('LOOP_MINUTES', '120'))
          CHECK_INTERVAL_SEC = 30
          JST = timezone(timedelta(hours=9))
          RUN_ID = os.environ.get('GITHUB_RUN_ID', 'local')
          RUN_URL = f"https://github.com/{REPO}/actions/runs/{RUN_ID}"
          # Lease TTL = loop length + 15min buffer (covers chain transition + new run startup)
          LEASE_TTL_MIN = LOOP_MINUTES + 15
          # Storm guard: only self re-chain if this run actually looped this long (minutes).
          # A run that exits early (lease miss, rate-limit 403 on acquire, crash) MUST NOT
          # re-chain — otherwise step 2 spawns a replacement in seconds → respawn storm that
          # pins the account-wide REST limit and 403s every Gist write. Cron */15 + watchdog
          # recover the chain instead. See KNOWLEDGE §3 (dispatcher respawn storm).
          MIN_RECHAIN_MIN = 5

          def send_alert(subject, body):
              """Minimal SMTP alert — inlined (mirrors heartbeat.yml pattern)."""
              user = os.environ.get('SMTP_USER'); pwd = os.environ.get('SMTP_PASS'); to = os.environ.get('NOTIFY_EMAIL')
              if not all([user, pwd, to]):
                  print("  (SMTP not configured, skip alert email)"); return
              try:
                  msg = MIMEText(body, 'plain', 'utf-8')
                  msg['Subject'] = subject; msg['From'] = user; msg['To'] = to
                  with smtplib.SMTP('smtp.gmail.com', 587, timeout=15) as s:
                      s.starttls(); s.login(user, pwd); s.send_message(msg)
                  print(f"  📧 Alert sent: {subject}")
              except Exception as e:
                  print(f"  ⚠️ Alert email failed: {e}")

          loop_start = time.time()
          loop_end = loop_start + (LOOP_MINUTES * 60)
          gist_etag = None
          cached_runs = None

          def gist_read():
              """Read scheduled-runs.json with ETag conditional caching."""
              global gist_etag, cached_runs
              url = f"https://api.github.com/gists/{GIST_ID}"
              req = urllib.request.Request(url)
              req.add_header('Authorization', f'Bearer {TOKEN}')
              req.add_header('Accept', 'application/vnd.github+json')
              if gist_etag:
                  req.add_header('If-None-Match', gist_etag)
              try:
                  with urllib.request.urlopen(req) as resp:
                      gist_etag = resp.headers.get('ETag')
                      data = json.loads(resp.read())
                      cached_runs = json.loads(data['files']['scheduled-runs.json']['content'])
                      return cached_runs
              except urllib.error.HTTPError as e:
                  if e.code == 304 and cached_runs is not None:
                      return cached_runs
                  print(f"  ❌ Gist read HTTP {e.code}")
                  return None
              except Exception as e:
                  print(f"  ❌ Gist read error: {e}")
                  return None

          def gist_write(entries):
              """Legacy bare-PATCH writer. Kept as fallback; main path uses gist_write_cas()."""
              global cached_runs, gist_etag
              url = f"https://api.github.com/gists/{GIST_ID}"
              payload = json.dumps({
                  "files": {"scheduled-runs.json": {"content": json.dumps(entries, indent=2)}}
              }).encode()
              req = urllib.request.Request(url, data=payload, method='PATCH')
              req.add_header('Authorization', f'Bearer {TOKEN}')
              req.add_header('Accept', 'application/vnd.github+json')
              req.add_header('Content-Type', 'application/json')
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"  📝 Gist updated (HTTP {resp.status})")
                      cached_runs = entries
                      gist_etag = resp.headers.get('ETag')
                      return True
              except urllib.error.HTTPError as e:
                  print(f"  ❌ Gist write HTTP {e.code}")
                  return False

          # Track entries we *intended* to mark dispatched, even if Gist write failed.
          # Prevents re-dispatch within this run when persistent write errors occur
          # (degrade-mode: better to miss the historical mark than to double-checkin).
          locally_dispatched_ids = set()

          def gist_write_cas(updated_entries, dispatched_ids_this_iter):
              """Atomic CAS-backed write. On persistent failure: alert + locally mark to prevent dup-dispatch.

              Returns True on success (including no_change), False on persistent failure.
              """
              global cached_runs, gist_etag
              if not HELPERS_OK:
                  # Helper import failed at startup → fall back to legacy writer.
                  ok = gist_write(updated_entries)
                  if not ok:
                      locally_dispatched_ids.update(dispatched_ids_this_iter)
                  return ok

              # Mutator merges OUR mark updates into whatever Gist currently holds.
              # Besides dispatched/last_run, we also migrate legacy entries that
              # have no `id` (older schema) by stamping generated ids. Without this,
              # recurring/once entries with missing id cannot persist last_run/
              # dispatched via CAS and get re-fired every loop.
              def _entry_key(ent):
                  et = ent.get('type', 'once')
                  wf = ent.get('workflow', '')
                  loc = ent.get('location', '')
                  lat = ent.get('location_lat')
                  lon = ent.get('location_lon')
                  note = ent.get('note', '')
                  if et == 'recurring':
                      rec = ent.get('recurrence') or {}
                      rec_key = json.dumps(rec, sort_keys=True, ensure_ascii=False)
                      return f"rec|{wf}|{rec_key}|{loc}|{lat}|{lon}|{note}"
                  run_at = ent.get('run_at') or ent.get('datetime') or ''
                  return f"one|{wf}|{run_at}|{loc}|{lat}|{lon}|{note}"

              marks_by_id = {}
              marks_by_key = {}
              for e in updated_entries:
                  eid = e.get('id')
                  if not eid:
                      continue
                  mark = {"id": eid}
                  if e.get('dispatched') is not None:
                      mark["dispatched"] = e.get('dispatched')
                  if e.get('last_run'):
                      mark["last_run"] = e.get('last_run')
                  include_mark = ('dispatched' in mark) or ('last_run' in mark) or str(eid).startswith('legacy-')
                  if not include_mark:
                      continue
                  marks_by_id[eid] = mark
                  if str(eid).startswith('legacy-'):
                      ek = _entry_key(e)
                      marks_by_key.setdefault(ek, []).append(mark)

              def _mutator(current):
                  if not isinstance(current, list):
                      # Gist file empty/corrupt → write our snapshot wholesale.
                      return updated_entries
                  out = []
                  for ent in current:
                      eid = ent.get('id')
                      m = marks_by_id.get(eid) if eid else None
                      if m is None and not eid:
                          # Legacy entry with no id in current gist: match by
                          # structural key and consume one mark slot.
                          ek = _entry_key(ent)
                          bucket = marks_by_key.get(ek)
                          if bucket:
                              m = bucket.pop(0)
                      if m:
                          if m.get('id') and not ent.get('id'):
                              ent['id'] = m['id']
                          if 'dispatched' in m:
                              ent['dispatched'] = m['dispatched']
                          if m.get('last_run'):
                              ent['last_run'] = m['last_run']
                      out.append(ent)
                  return out

              try:
                  result = cas_update(GIST_ID, 'scheduled-runs.json', _mutator, TOKEN, max_retries=3)
              except Exception as e:
                  result = {'ok': False, 'error': f'cas_update raised: {e}'}

              if result.get('ok'):
                  cached_runs = result.get('final_content') or updated_entries
                  gist_etag = None  # force fresh read next iter (CAS bypassed our cache)
                  return True

              ids_csv = ','.join(sorted(dispatched_ids_this_iter)) or '<none>'
              err = result.get('error', 'unknown')
              print(f"  🚨 CRITICAL: gist write failed after retries — entries: {ids_csv} — {err}")
              # Degrade mode: remember locally so we don't re-dispatch in this run.
              locally_dispatched_ids.update(dispatched_ids_this_iter)
              try:
                  send_alert(
                      f"🚨 Dispatcher gist write failed (run {RUN_ID})",
                      (f"cas_update to scheduled-runs.json failed after retries.\n"
                       f"Entries we dispatched but could not persist: {ids_csv}\n"
                       f"Error: {err}\n\n"
                       f"In-run dedup is active for these ids. Next dispatcher run MAY re-dispatch\n"
                       f"if its first read still shows dispatched=false.\n\n"
                       f"Run: {RUN_URL}"))
              except Exception as e:
                  print(f"  (alert send failed: {e})", file=sys.stderr)
              return False

          def dispatch_workflow(workflow, reason="", inputs=None):
              if not TOKEN:
                  print(f"  ⚠️ GH_PAT not set")
                  return False
              url = f"https://api.github.com/repos/{REPO}/actions/workflows/{workflow}/dispatches"
              payload = {"ref": "main"}
              if inputs:
                  payload["inputs"] = inputs
              data = json.dumps(payload).encode()
              req = urllib.request.Request(url, data=data, method='POST')
              req.add_header('Authorization', f'Bearer {TOKEN}')
              req.add_header('Accept', 'application/vnd.github+json')
              req.add_header('Content-Type', 'application/json')
              try:
                  with urllib.request.urlopen(req) as resp:
                      print(f"  ✅ Triggered {workflow} (HTTP {resp.status}) {reason}")
                      return True
              except urllib.error.HTTPError as e:
                  print(f"  ❌ Dispatch {workflow} HTTP {e.code}")
                  return False

          # Checkin workflows fire this many seconds early so the in-workflow
          # random jitter (0–600s) results in an actual API call at T-10min..T.
          CHECKIN_ADVANCE_S = 600

          def should_run_recurring(entry, now_jst):
              if entry.get('enabled') is False: return False
              rec = entry.get('recurrence', {})
              pattern = rec.get('pattern', '')
              sched_time = rec.get('time', '00:00')
              start_date = rec.get('start_date')
              end_date = rec.get('end_date')
              skip_dates = rec.get('skip_dates') or []
              today_str = now_jst.strftime('%Y-%m-%d')
              if start_date and today_str < start_date: return False
              if end_date and today_str > end_date: return False
              if today_str in skip_dates: return False
              last_run = entry.get('last_run')
              if last_run:
                  last_run_dt = datetime.fromisoformat(last_run.replace('Z', '+00:00'))
                  if last_run_dt.astimezone(JST).date() == now_jst.date(): return False
              hour, minute = map(int, sched_time.split(':'))
              sched_dt = now_jst.replace(hour=hour, minute=minute, second=0, microsecond=0)
              # Checkin workflows fire CHECKIN_ADVANCE_S early so in-workflow
              # jitter can make the actual API call land before the scheduled time.
              advance = CHECKIN_ADVANCE_S if 'checkin' in entry.get('workflow', '') else 0
              if (now_jst - sched_dt).total_seconds() < -advance: return False
              dow = now_jst.weekday()
              js_dow = (dow + 1) % 7 if dow < 6 else 0
              if pattern == 'daily': return True
              elif pattern == 'weekdays': return js_dow in [1,2,3,4,5]
              elif pattern == 'weekly': return js_dow in rec.get('days', [])
              elif pattern == 'monthly': return now_jst.day in rec.get('dates', [])
              return False

          def process_runs():
              runs = gist_read()
              if not runs: return 0
              now = datetime.now(timezone.utc)
              now_jst = now.astimezone(JST)
              updated = []
              triggered = 0
              changed = False
              dispatched_ids_this_iter = set()
              for entry in runs:
                  # Back-compat migration: legacy entries could be missing `id`.
                  # Generate one so CAS can persist marks and prevent re-dispatch.
                  if not entry.get('id'):
                      entry['id'] = f"legacy-{uuid.uuid4().hex[:12]}"
                      changed = True
                  entry_type = entry.get('type', 'once')
                  entry_inputs = {}
                  if entry.get('location'):
                      entry_inputs['location'] = entry['location']
                  if entry.get('location_lat') is not None:
                      entry_inputs['latitude'] = str(entry['location_lat'])
                  if entry.get('location_lon') is not None:
                      entry_inputs['longitude'] = str(entry['location_lon'])
                  if entry_type == 'recurring':
                      if should_run_recurring(entry, now_jst):
                          wf = entry['workflow']
                          rec = entry.get('recurrence', {})
                          print(f"🔁 Recurring: {wf} ({rec.get('pattern','')}, {rec.get('time','')})")
                          # Tag trigger_source=recurring so workers default-skip
                          # late-edit overwrites (e.g. CO already recorded).
                          rec_inputs = dict(entry_inputs)
                          rec_inputs['trigger_source'] = 'recurring'
                          if dispatch_workflow(wf, "[recurring]", rec_inputs or None):
                              entry['last_run'] = now.isoformat()
                              triggered += 1
                              changed = True
                              if entry.get('id'):
                                  dispatched_ids_this_iter.add(entry['id'])
                      updated.append(entry)
                  else:
                      run_at_str = entry.get('run_at', '')
                      if not run_at_str:
                          updated.append(entry); continue
                      if entry.get('dispatched'):
                          # Already dispatched — keep for history
                          updated.append(entry); continue
                      # Degrade-mode: if a previous iter dispatched this but Gist write failed,
                      # treat it as already-dispatched locally to avoid duplicate checkin.
                      if entry.get('id') in locally_dispatched_ids:
                          entry['dispatched'] = True
                          updated.append(entry); continue
                      if entry.get('enabled') is False:
                          # Paused one-time entry — keep but skip dispatch
                          updated.append(entry); continue
                      run_at = datetime.fromisoformat(run_at_str.replace('Z', '+00:00'))
                      # Checkin one-time entries fire CHECKIN_ADVANCE_S early so
                      # in-workflow jitter produces actual API call at T-10min..T.
                      wf_name = entry.get('workflow', '')
                      advance = timedelta(seconds=CHECKIN_ADVANCE_S) if 'checkin' in wf_name else timedelta(0)
                      if run_at - advance <= now:
                          wf = entry['workflow']
                          print(f"🔹 One-time: {wf} (scheduled {run_at_str})")
                          # One-time entries are user-created intent (default to
                          # 'scheduled'; can be 'manual' if entry has flag).
                          one_inputs = dict(entry_inputs)
                          one_inputs['trigger_source'] = entry.get('trigger_source', 'scheduled')
                          if dispatch_workflow(wf, "[one-time]", one_inputs or None):
                              # Mark dispatched, keep in list for history
                              entry['dispatched'] = True
                              entry['last_run'] = now.isoformat()
                              triggered += 1
                              changed = True
                              if entry.get('id'):
                                  dispatched_ids_this_iter.add(entry['id'])
                          updated.append(entry)
                      else:
                          updated.append(entry)
              if changed:
                  gist_write_cas(updated, dispatched_ids_this_iter)
              return triggered

          # --- Lease acquisition (Phase 4: prevent concurrent dispatchers) ---
          # Why: concurrency.cancel-in-progress=false + cron */15 + heartbeat resurrects
          # can spawn 2+ dispatchers fighting over the same Gist. Lease serializes them.
          # Degrade-mode: if lease helper fails (network/PAT), we proceed without it —
          # duplicate dispatch is bad, but no dispatch at all is worse.
          lease_held = False
          if HELPERS_OK and TOKEN:
              for attempt in (1, 2):
                  try:
                      lease_result = lease_acquire(RUN_ID, RUN_URL, ttl_minutes=LEASE_TTL_MIN, token=TOKEN)
                  except Exception as e:
                      lease_result = {'acquired': False, 'reason': f'exception: {e}'}
                  if lease_result.get('acquired'):
                      lease_held = True
                      print(f"🔒 Lease acquired (TTL={LEASE_TTL_MIN} min, attempt {attempt})")
                      break
                  if attempt == 1 and 'CAS error' in (lease_result.get('reason') or ''):
                      # Network blip — retry once
                      print(f"  (lease attempt 1 failed: {lease_result.get('reason')}; retrying once)")
                      time.sleep(2)
                      continue
                  print(f"⏭️  Another dispatcher live (owner={lease_result.get('current_owner')}, reason={lease_result.get('reason')}). Exiting clean.")
                  sys.exit(0)
              if not lease_held:
                  print("  ⚠️ Lease acquire failed twice; proceeding in degrade-mode (no lease).")
          else:
              print("  ⚠️ Lease disabled (helpers missing or no token); running without concurrency guard.")

          try:
              print(f"🔄 Loop start: {LOOP_MINUTES} min, check every {CHECK_INTERVAL_SEC}s")
              # Cold-start sweep: explicitly scan & dispatch overdue entries on first iter.
              # The main loop already handles this via process_runs(), but log it explicitly
              # so post-incident debugging can confirm catch-up happened immediately.
              try:
                  cold_start_runs = gist_read()
                  if cold_start_runs:
                      now_cs = datetime.now(timezone.utc)
                      overdue_count = 0
                      for entry in cold_start_runs:
                          if entry.get('type') != 'once': continue
                          if entry.get('dispatched') or entry.get('enabled') is False: continue
                          run_at_str = entry.get('run_at', '')
                          if not run_at_str: continue
                          try:
                              run_at = datetime.fromisoformat(run_at_str.replace('Z', '+00:00'))
                              if run_at <= now_cs:
                                  overdue_count += 1
                          except Exception:
                              pass
                      if overdue_count > 0:
                          print(f"📋 Cold-start: {overdue_count} overdue one-time entries detected, will dispatch in iter 1")
              except Exception as e:
                  print(f"  (cold-start sweep skipped: {e})")
              iteration = 0
              total_dispatched = 0
              while time.time() < loop_end:
                  iteration += 1
                  # Heartbeat first — if False, another dispatcher stole the lease
                  # (e.g. we crashed past lease_until and someone else took over).
                  if lease_held:
                      try:
                          still_owner = lease_heartbeat(RUN_ID, TOKEN, ttl_minutes=LEASE_TTL_MIN)
                      except Exception as e:
                          # Transient — log + continue. Do NOT exit on heartbeat exception.
                          still_owner = True
                          print(f"  [iter {iteration}] heartbeat exception (continuing): {e}")
                      if still_owner is False:
                          print(f"🚨 Lease stolen at iter {iteration}, exiting clean to let new owner run.")
                          sys.exit(0)
                  try:
                      n = process_runs()
                      if n > 0:
                          total_dispatched += n
                          print(f"  [iter {iteration}] dispatched {n} (total: {total_dispatched})")
                  except Exception as e:
                      print(f"  [iter {iteration}] error: {e}")
                  remaining = loop_end - time.time()
                  if remaining <= 0: break
                  time.sleep(min(CHECK_INTERVAL_SEC, remaining))

              elapsed_min = (time.time() - loop_start) / 60
              print(f"\n✅ Loop ended: {elapsed_min:.1f} min, {iteration} iter, {total_dispatched} dispatched")
              # Storm guard: signal step 2 to re-chain ONLY if we looped long enough.
              # Early exits (lease miss / rate-limit / crash) bypass this → no respawn.
              gho = os.environ.get('GITHUB_OUTPUT')
              if gho and elapsed_min >= MIN_RECHAIN_MIN:
                  with open(gho, 'a') as _f:
                      _f.write('rechain=1\n')
                  print(f"  ↻ re-chain armed (looped {elapsed_min:.1f} min ≥ {MIN_RECHAIN_MIN})")
              else:
                  print(f"  ⛔ re-chain suppressed (looped {elapsed_min:.1f} min < {MIN_RECHAIN_MIN}) — cron/watchdog will recover")
          finally:
              # Always release on exit so next run can acquire immediately.
              if lease_held:
                  try:
                      lease_release(RUN_ID, TOKEN)
                      print("🔓 Lease released")
                  except Exception as e:
                      print(f"  ⚠️ Lease release failed (will expire via TTL): {e}")
          EOF

      - name: Re-trigger self (chain next run)
        # Only re-chain when the loop ran a meaningful duration (storm guard).
        # Early-exit runs leave outputs.rechain unset → no respawn. Recovery falls
        # back to backup cron */15 + watchdog, which is safe (no rate-limit storm).
        if: always() && steps.loop.outputs.rechain == '1'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Keep workflow enabled (GitHub disables after 60 days inactivity)
          gh api "repos/$GITHUB_REPOSITORY/actions/workflows/scheduled-dispatch.yml/enable" --method PUT 2>/dev/null || true
          # Self re-dispatch — continuous loop without depending on cron
          echo "🔁 Re-dispatching self for next loop chunk..."
          gh workflow run scheduled-dispatch.yml --ref main || echo "⚠️ Self re-dispatch failed; backup cron will recover"
