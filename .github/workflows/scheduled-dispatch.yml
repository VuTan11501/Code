name: Scheduled Run Dispatcher

on:
  schedule:
    # Check every 5 minutes for pending scheduled runs
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: scheduled-dispatch
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scheduled-runs.json

      - name: Process scheduled runs
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, os, sys
          from datetime import datetime, timezone
          import urllib.request
          import urllib.error

          SCHED_FILE = '.github/scheduled-runs.json'
          REPO = os.environ['GITHUB_REPOSITORY']
          TOKEN = os.environ.get('GH_TOKEN', '')

          if not os.path.exists(SCHED_FILE):
              print("No scheduled-runs.json found. Nothing to do.")
              sys.exit(0)

          with open(SCHED_FILE, 'r') as f:
              runs = json.load(f)

          if not runs:
              print("No scheduled runs pending.")
              sys.exit(0)

          now = datetime.now(timezone.utc)
          pending = []
          triggered = []

          for r in runs:
              run_at = datetime.fromisoformat(r['run_at'].replace('Z', '+00:00'))
              # Allow 2 minute grace window (run_at <= now + 2min)
              if run_at <= now:
                  # Time to dispatch
                  workflow = r['workflow']
                  print(f"🚀 Dispatching {workflow} (scheduled for {r['run_at']})")

                  if TOKEN:
                      url = f"https://api.github.com/repos/{REPO}/actions/workflows/{workflow}/dispatches"
                      data = json.dumps({"ref": "main"}).encode()
                      req = urllib.request.Request(url, data=data, method='POST')
                      req.add_header('Authorization', f'Bearer {TOKEN}')
                      req.add_header('Accept', 'application/vnd.github+json')
                      req.add_header('Content-Type', 'application/json')
                      try:
                          with urllib.request.urlopen(req) as resp:
                              print(f"  ✅ Triggered {workflow} (HTTP {resp.status})")
                              triggered.append(r)
                      except urllib.error.HTTPError as e:
                          print(f"  ❌ Failed to trigger {workflow}: HTTP {e.code}")
                          # Keep in queue for retry
                          pending.append(r)
                  else:
                      print(f"  ⚠️ GH_PAT not set, cannot dispatch")
                      pending.append(r)
              else:
                  # Not yet time
                  pending.append(r)

          # Write back remaining pending runs
          if len(pending) != len(runs):
              with open(SCHED_FILE, 'w') as f:
                  json.dump(pending, f, indent=2)
              print(f"\n📝 Updated queue: {len(pending)} remaining, {len(triggered)} dispatched")
          else:
              print(f"\n⏳ No runs due yet. {len(pending)} still pending.")
          EOF

      - name: Commit changes
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/scheduled-runs.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sched: dispatch completed runs [skip ci]"
            git push
          fi
