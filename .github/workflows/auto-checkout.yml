name: Auto Checkout

on:
  workflow_dispatch:
    inputs:
      location:
        description: Location
        required: true
        type: choice
        default: office
        options:
          - office
          - home

permissions:
  contents: read

concurrency:
  group: auto-checkout
  cancel-in-progress: false

env:
  TZ: Asia/Tokyo

jobs:
  checkout:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run checkout script
        id: checkout_step
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          FORCE_ACTION: checkout
          FORCE_LOCATION: ${{ inputs.location || 'office' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python .github/scripts/gh_checkin.py

      - name: LINE Notify on failure
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: python .github/scripts/line_notify.py "❌ Auto Checkout FAILED - Run #${{ github.run_number }} ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Update secret if token rotated
        if: always() && steps.checkout_step.outputs.token_rotated == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_REFRESH_TOKEN: ${{ steps.checkout_step.outputs.new_refresh_token }}
        run: |
          if [ -n "$NEW_REFRESH_TOKEN" ] && [ -n "$GH_TOKEN" ]; then
            gh secret set AZURE_REFRESH_TOKEN --body "$NEW_REFRESH_TOKEN" --repo "$GITHUB_REPOSITORY"
            echo "✅ Secret updated with rotated token"
          else
            echo "⚠️ Token rotated but GH_PAT not set or new token empty"
          fi
