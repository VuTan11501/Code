name: Auto Checkout

on:
  workflow_dispatch:
    inputs:
      location:
        description: Location key (office, home, or custom key from PWA)
        required: false
        type: string
        default: office
      latitude:
        description: Override latitude (decimal) — bypasses schedule.json lookup
        required: false
        type: string
      longitude:
        description: Override longitude (decimal) — bypasses schedule.json lookup
        required: false
        type: string
      force_update_co:
        description: Overwrite an existing checkout (default skip if CO already recorded)
        required: false
        type: boolean
        default: false
      trigger_source:
        description: 'Dispatch origin: manual (user) | scheduled (one-time) | recurring (replay-prone)'
        required: false
        type: string
        default: manual
  # Triggered by Cloudflare Worker /checkout endpoint (Siri Shortcut).
  # client_payload: { location, source, triggered_at }
  repository_dispatch:
    types: [manual_checkout]

permissions:
  contents: read

concurrency:
  group: auto-checkout
  cancel-in-progress: false

env:
  TZ: Asia/Tokyo

jobs:
  checkout:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Jitter — natural late checkout (skip for manual/Siri dispatch)
        # Sleeps 0–600 s so the actual DokoKin API call lands 0–10 min after
        # the scheduled checkout time, giving a natural departure timestamp.
        # Skipped for manual triggers so immediate user action responds fast.
        if: ${{ inputs.trigger_source != 'manual' && github.event_name != 'repository_dispatch' }}
        run: |
          DELAY=$(( RANDOM % 601 ))
          echo "⏱️ Jitter ${DELAY}s (natural late-checkout timing)"
          sleep "$DELAY"

      - name: Run checkout script
        id: checkout_step
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          FORCE_ACTION: checkout
          FORCE_LOCATION: ${{ inputs.location || github.event.client_payload.location || 'home' }}
          FORCE_LATITUDE: ${{ inputs.latitude }}
          FORCE_LONGITUDE: ${{ inputs.longitude }}
          FORCE_UPDATE_CO: ${{ inputs.force_update_co && '1' || '' }}
          # TRIGGER_SOURCE classifies the dispatch origin:
          #   - manual: user-initiated (Siri repository_dispatch, or workflow_dispatch
          #     from dashboard/CLI). Implicitly opts into FORCE_UPDATE_CO so late
          #     checkout overwrites existing CO.
          #   - scheduled: dispatched by scheduled-dispatch.yml from a Gist entry.
          #     Default-skip if CO exists (prevents stale-replay clobber).
          TRIGGER_SOURCE: ${{ github.event_name == 'repository_dispatch' && 'manual' || inputs.trigger_source || 'manual' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GH_PAT: ${{ secrets.GH_PAT }}
        # Stdlib-only script; runner already has Python preinstalled.
        run: python3 .github/scripts/gh_checkin.py

      - name: LINE Notify on failure
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: python3 .github/scripts/line_notify.py "❌ Auto Checkout FAILED - Run #${{ github.run_number }} ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      # Phase 3: token rotation is queued by the worker into Gist
      # pending_token_rotation.json and applied centrally by token-monitor.yml.
