name: Dispatcher Watchdog

# Independent guardian — verifies Scheduled Run Dispatcher is alive
# Runs on its own cron schedule. If dispatcher has been silent too long,
# wakes it up. Uses separate workflow file so it survives even if the
# main dispatcher is disabled.

on:
  schedule:
    # Every 20 minutes — independent of dispatcher's own cron
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: dispatcher-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check dispatcher health and resurrect if dead
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'EOF'
          import json, os, sys
          from datetime import datetime, timezone, timedelta
          import urllib.request, urllib.error

          TOKEN = os.environ['GH_TOKEN']
          REPO = os.environ['REPO']
          # Max acceptable silence: 10 min. If no in_progress/recent run, resurrect.
          MAX_SILENCE_MIN = 10

          def gh_api(path, method='GET', data=None):
              url = f"https://api.github.com{path}"
              req = urllib.request.Request(url, method=method)
              req.add_header('Authorization', f'Bearer {TOKEN}')
              req.add_header('Accept', 'application/vnd.github+json')
              if data:
                  req.add_header('Content-Type', 'application/json')
                  req.data = json.dumps(data).encode()
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      raw = resp.read()
                      return resp.status, (json.loads(raw) if raw else {})
              except urllib.error.HTTPError as e:
                  return e.code, {}

          # 1) Check workflow is ENABLED
          status, wf = gh_api(f"/repos/{REPO}/actions/workflows/scheduled-dispatch.yml")
          if status != 200:
              print(f"❌ Cannot read dispatcher workflow: HTTP {status}")
              sys.exit(1)
          wf_state = wf.get('state')
          print(f"  Dispatcher state: {wf_state}")
          if wf_state != 'active':
              print(f"⚠️ Dispatcher is {wf_state}! Re-enabling...")
              s, _ = gh_api(f"/repos/{REPO}/actions/workflows/scheduled-dispatch.yml/enable", method='PUT')
              print(f"  Enable result: HTTP {s}")

          # 2) Check recent runs: must have one in_progress OR completed in last MAX_SILENCE_MIN
          status, runs_data = gh_api(f"/repos/{REPO}/actions/workflows/scheduled-dispatch.yml/runs?per_page=5")
          if status != 200:
              print(f"❌ Cannot list dispatcher runs: HTTP {status}")
              sys.exit(1)
          runs = runs_data.get('workflow_runs', [])
          if not runs:
              print("⚠️ No runs found at all — kicking dispatcher")
              gh_api(f"/repos/{REPO}/actions/workflows/scheduled-dispatch.yml/dispatches",
                     method='POST', data={'ref': 'main'})
              sys.exit(0)

          now = datetime.now(timezone.utc)
          latest = runs[0]
          latest_status = latest.get('status')
          latest_updated = datetime.fromisoformat(latest['updated_at'].replace('Z', '+00:00'))
          age_min = (now - latest_updated).total_seconds() / 60
          print(f"  Latest run: #{latest['id']} status={latest_status} age={age_min:.1f}min")

          # If something is in_progress, dispatcher is alive
          if latest_status == 'in_progress':
              print("✅ Dispatcher is alive (in_progress)")
              sys.exit(0)

          # If recent completed run within window, dispatcher is healthy (just between loops)
          if age_min < MAX_SILENCE_MIN:
              print(f"✅ Dispatcher recently active ({age_min:.1f}min ago)")
              sys.exit(0)

          # SILENT TOO LONG — resurrect
          print(f"🚨 Dispatcher silent for {age_min:.1f}min (>{MAX_SILENCE_MIN}min)! Resurrecting...")
          s, _ = gh_api(f"/repos/{REPO}/actions/workflows/scheduled-dispatch.yml/dispatches",
                        method='POST', data={'ref': 'main'})
          if s == 204:
              print("✅ Dispatcher resurrected successfully")
          else:
              print(f"❌ Failed to resurrect: HTTP {s}")
              sys.exit(1)
          EOF
