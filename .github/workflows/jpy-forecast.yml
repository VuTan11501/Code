name: JPY Forecast Daily Report

on:
  schedule:
    # Chạy 7:30 sáng JST mỗi ngày (22:30 UTC ngày trước)
    - cron: '30 22 * * *'
    # Backup cron (+30min) in case primary is delayed
    - cron: '0 23 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (không gửi email)'
        required: false
        type: boolean
        default: false

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  SMTP_SERVER: smtp.gmail.com
  SMTP_PORT: "587"
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

# Prevent duplicate reports: if primary is running, backup is skipped
concurrency:
  group: jpy-forecast-daily
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: finance/requirements.txt

      - name: Install dependencies
        run: pip install -r finance/requirements.txt

      - name: Run JPY Forecast Pipeline
        working-directory: finance
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-report-${{ github.run_id }}
          path: finance/data/report_*.html
          retention-days: 30

      - name: Commit model updates
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit model metadata (not the pickle binary)
          if git diff --quiet finance/data/models/usdjpy_meta.json 2>/dev/null; then
            echo "No model changes to commit"
          else
            git add finance/data/models/usdjpy_meta.json || true
            git commit -m "chore: update ML model metadata [skip ci]" || true
            git push || true
          fi
