name: JPY Forecast Daily Report

on:
  schedule:
    # 07:30 JST Mon-Fri only (22:30 UTC Sun-Thu). FX market closed on weekends.
    - cron: '30 22 * * 0-4'
    # Backup cron (+30min) in case primary is delayed
    - cron: '0 23 * * 0-4'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (không gửi email)'
        required: false
        type: boolean
        default: false

env:
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
  SMTP_SERVER: smtp.gmail.com
  SMTP_PORT: "587"
  SMTP_USER: ${{ secrets.SMTP_USER }}
  SMTP_PASS: ${{ secrets.SMTP_PASS }}
  NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}

# Prevent duplicate reports: if primary is running, backup is skipped
concurrency:
  group: jpy-forecast-daily
  cancel-in-progress: true

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: finance/requirements.txt

      - name: Install dependencies
        run: pip install -r finance/requirements.txt

      - name: Run JPY Forecast Pipeline
        working-directory: finance
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-report-${{ github.run_id }}
          path: finance/data/report_*.html
          retention-days: 30

      - name: Commit model updates
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Only commit model metadata (not the pickle binary)
          if git diff --quiet finance/data/models/usdjpy_meta.json 2>/dev/null; then
            echo "No model changes to commit"
          else
            git add finance/data/models/usdjpy_meta.json || true
            git commit -m "chore: update ML model metadata [skip ci]" || true
            git push || true
          fi

      - name: Notify on failure (Email + LINE)
        if: failure()
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: |
          python -c "
          import smtplib, os
          from email.mime.text import MIMEText
          msg = MIMEText('JPY Forecast pipeline failed.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}')
          msg['Subject'] = '🚨 JPY Forecast FAILED - ${{ github.run_id }}'
          msg['From'] = os.environ['SMTP_USER']
          msg['To'] = os.environ['NOTIFY_EMAIL']
          with smtplib.SMTP('smtp.gmail.com', 587, timeout=15) as s:
              s.starttls()
              s.login(os.environ['SMTP_USER'], os.environ['SMTP_PASS'])
              s.send_message(msg)
          print('Failure notification sent')
          "
          python .github/scripts/line_notify.py "🚨 JPY Forecast FAILED - Run #${{ github.run_number }} ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
