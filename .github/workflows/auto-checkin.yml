name: Auto Checkin

on:
  workflow_dispatch:
    inputs:
      location:
        description: Location key (office, home, or custom key from PWA)
        required: false
        type: string
        default: office
      latitude:
        description: Override latitude (decimal) — bypasses schedule.json lookup
        required: false
        type: string
      longitude:
        description: Override longitude (decimal) — bypasses schedule.json lookup
        required: false
        type: string
      trigger_source:
        description: 'Dispatch origin: manual | scheduled | recurring'
        required: false
        type: string
        default: manual
  # Triggered by Cloudflare Worker /checkin endpoint (Siri Shortcut).
  # client_payload: { location, source, triggered_at }
  repository_dispatch:
    types: [manual_checkin]

permissions:
  contents: read

concurrency:
  group: auto-checkin
  cancel-in-progress: false

env:
  TZ: Asia/Tokyo

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Jitter — natural early checkin (skip for manual/Siri dispatch)
        # Sleeps 0–600 s so the actual DokoKin API call lands anywhere in the
        # 10-minute window before the scheduled time (dispatcher fires this
        # workflow 10 min early for exactly this reason). Skipped for manual
        # triggers so Siri / dashboard "checkin now" responds immediately.
        if: ${{ inputs.trigger_source != 'manual' && github.event_name != 'repository_dispatch' }}
        run: |
          DELAY=$(( RANDOM % 601 ))
          echo "⏱️ Jitter ${DELAY}s (natural early-checkin timing)"
          sleep "$DELAY"

      - name: Run checkin script
        id: checkin
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          FORCE_ACTION: checkin
          FORCE_LOCATION: ${{ inputs.location || github.event.client_payload.location || 'office' }}
          FORCE_LATITUDE: ${{ inputs.latitude }}
          FORCE_LONGITUDE: ${{ inputs.longitude }}
          TRIGGER_SOURCE: ${{ github.event_name == 'repository_dispatch' && 'manual' || inputs.trigger_source || 'manual' }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          GH_PAT: ${{ secrets.GH_PAT }}
        # Stdlib-only script; runner already has Python preinstalled.
        run: python3 .github/scripts/gh_checkin.py

      - name: LINE Notify on failure
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: python3 .github/scripts/line_notify.py "❌ Auto Checkin FAILED - Run #${{ github.run_number }} ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
      # Phase 3: token rotation is queued by the worker into Gist
      # pending_token_rotation.json and applied centrally by token-monitor.yml.
