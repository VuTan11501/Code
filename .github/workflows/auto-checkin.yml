name: Auto Checkin/Checkout

on:
  # Triggered by scheduled-dispatch.yml (Gist-based scheduler) for precise timing.
  # Native cron removed — uses Gist entries: 09:00, 18:00, 22:00, 00:00, 03:30, 14:30
  workflow_dispatch:
    inputs:
      action:
        description: Force action
        required: true
        type: choice
        default: auto
        options:
          - auto
          - checkin
          - checkout
      location:
        description: Location
        required: true
        type: choice
        default: office
        options:
          - office
          - home

permissions:
  contents: read

# Prevent parallel runs (backup cron waits for primary to finish)
concurrency:
  group: auto-checkin
  cancel-in-progress: false

env:
  TZ: Asia/Tokyo

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run checkin script
        id: checkin
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          FORCE_ACTION: ${{ inputs.action == 'auto' && '' || inputs.action }}
          FORCE_LOCATION: ${{ inputs.location || 'office' }}
          TRIGGER_CRON: ${{ github.event.schedule }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python .github/scripts/gh_checkin.py

      - name: LINE Notify on failure
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: python .github/scripts/line_notify.py "❌ Auto Checkin FAILED - Run #${{ github.run_number }} ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Update secret if token rotated
        if: always() && steps.checkin.outputs.token_rotated == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_REFRESH_TOKEN: ${{ steps.checkin.outputs.new_refresh_token }}
        run: |
          if [ -n "$NEW_REFRESH_TOKEN" ] && [ -n "$GH_TOKEN" ]; then
            gh secret set AZURE_REFRESH_TOKEN --body "$NEW_REFRESH_TOKEN" --repo "$GITHUB_REPOSITORY"
            echo "✅ Secret updated with rotated token"
          else
            echo "⚠️ Token rotated but GH_PAT not set or new token empty"
          fi
