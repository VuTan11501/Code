name: Auto Checkin/Checkout

on:
  schedule:
    # All times UTC. JST = UTC+9
    - cron: '0 0 * * 1-5'     # 09:00 JST Mon-Fri (workday CI)
    - cron: '0 9 * * 1-5'     # 18:00 JST Mon-Fri (workday CO)
    - cron: '0 13 * * *'      # 22:00 JST (night OT CI)
    - cron: '0 15 * * *'      # 00:00 JST (midnight CO)
    - cron: '30 18 * * *'     # 03:30 JST (night OT CO + Sunday OT CO)
    - cron: '30 5 * * 0'      # 14:30 JST Sunday (Sunday OT CI, 1h early for break)

  workflow_dispatch:
    inputs:
      action:
        description: Force action
        required: true
        type: choice
        default: auto
        options:
          - auto
          - checkin
          - checkout
      location:
        description: Location
        required: true
        type: choice
        default: office
        options:
          - office
          - home

permissions:
  contents: read

env:
  TZ: Asia/Tokyo

jobs:
  checkin:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run checkin script
        id: checkin
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          FORCE_ACTION: ${{ inputs.action == 'auto' && '' || inputs.action }}
          FORCE_LOCATION: ${{ inputs.location || 'office' }}
          TRIGGER_CRON: ${{ github.event.schedule }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python .github/scripts/gh_checkin.py

      - name: Update secret if token rotated
        if: always() && steps.checkin.outputs.token_rotated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_REFRESH_TOKEN: ${{ steps.checkin.outputs.new_refresh_token }}
        run: |
          if [ -n "$NEW_REFRESH_TOKEN" ] && [ -n "$GH_TOKEN" ]; then
            gh secret set AZURE_REFRESH_TOKEN --body "$NEW_REFRESH_TOKEN" --repo "$GITHUB_REPOSITORY"
            echo "✅ Secret updated with rotated token"
          else
            echo "⚠️ Token rotated but GH_PAT not set or new token empty"
          fi
