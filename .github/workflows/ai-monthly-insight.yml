name: AI Monthly Insight

on:
  schedule:
    - cron: '0 0 1 * *'  # 00:00 UTC 1st of month = 09:00 JST
  workflow_dispatch:
    inputs:
      month:
        description: "Override month (YYYY-MM)"
        required: false
      dry_run:
        type: boolean
        default: false

concurrency:
  group: ai-monthly-insight
  cancel-in-progress: false

permissions:
  contents: read
  actions: read

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Tokyo
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github/scripts/

      - name: Run monthly insight  # stdlib-only, uses preinstalled python3
        id: insight
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          AZURE_APP_ID: f5be0f68-7285-4365-b979-10af0f3f4106
          AZURE_TENANT_ID: f01e930a-b52e-42b1-b70f-a8882b5d043b
          GH_PAT: ${{ secrets.GH_PAT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          AI_API_BASE: https://models.inference.ai.azure.com
        run: |
          FLAGS=""
          if [ -n "${{ inputs.month }}" ]; then
            FLAGS="$FLAGS --month ${{ inputs.month }}"
          fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            FLAGS="$FLAGS --dry-run"
          fi
          python3 .github/scripts/ai_monthly_insight.py $FLAGS
      # Phase 3: token rotation is queued by the worker into Gist
      # pending_token_rotation.json and applied centrally by token-monitor.yml.

