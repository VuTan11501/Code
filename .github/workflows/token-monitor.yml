name: Token Health Monitor

on:
  # Every 30 min: workers queue rotated tokens into Gist
  # pending_token_rotation.json (Phase 3 hardening — workers no longer call
  # `gh secret set` directly to avoid race conditions). This monitor is now
  # the SOLE rotator of the AZURE_REFRESH_TOKEN secret, so it must drain the
  # queue frequently enough that worker-side rotations propagate quickly.
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

# Serialize with azure-reauth (the only other workflow that mutates the
# AZURE_REFRESH_TOKEN secret). Workers do NOT join this group — they only
# write to the Gist queue, which is itself ETag-CAS-safe.
concurrency:
  group: azure-token-rotation
  cancel-in-progress: false

env:
  TZ: Asia/Tokyo

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            .github/scripts

      - name: Check token health
        id: token_check
        env:
          AZURE_REFRESH_TOKEN: ${{ secrets.AZURE_REFRESH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GH_PAT: ${{ secrets.GH_PAT }}
          GIST_ID: ${{ vars.GIST_ID || 'abc2a47c0a396025a72a6580227ff493' }}
        # Stdlib-only script; runner already has Python preinstalled.
        run: python3 .github/scripts/token_monitor.py --gist

      - name: Update secret if token rotated
        if: always() && steps.token_check.outputs.token_rotated == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          NEW_REFRESH_TOKEN: ${{ steps.token_check.outputs.new_refresh_token }}
        run: |
          if [ -z "$NEW_REFRESH_TOKEN" ] || [ -z "$GH_TOKEN" ]; then
            echo "❌ NEW_REFRESH_TOKEN or GH_TOKEN is empty — cannot rotate"
            exit 1
          fi
          if gh secret set AZURE_REFRESH_TOKEN --body "$NEW_REFRESH_TOKEN" --repo "$GITHUB_REPOSITORY"; then
            echo "✅ rotated"
          else
            echo "❌ rotation failed"
            exit 1
          fi

      - name: Alert on expiry
        if: failure()
        env:
          LINE_NOTIFY_TOKEN: ${{ secrets.LINE_NOTIFY_TOKEN }}
        run: python3 .github/scripts/line_notify.py "🚨 DokoKin token is UNHEALTHY! Run dokokin_auth_login to refresh."

      - name: Send email alert on expiry
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "⚠️ DokoKin Token Expiring Soon"
          to: ${{ secrets.NOTIFY_EMAIL }}
          from: ${{ secrets.SMTP_USER }}
          body: "The DokoKin authentication token is unhealthy or expiring soon. Please run `dokokin_auth_login` to refresh it."
